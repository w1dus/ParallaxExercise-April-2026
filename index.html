<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
        <!--스타일-->
        <link rel="stylesheet" href="./style/default.css">
        <link rel="stylesheet" href="./style/font.css">
        <link rel="stylesheet" href="./style/style.css">
        <link rel="stylesheet" href="./style/swiper.min.css">
        <link rel="stylesheet" href="./style/animation.css">
        <link rel="stylesheet" href="./style/customBoard.css">
        <!--스크립트-->
        <script type="text/javascript" src="./script/script.js"></script>
        <script type="text/javascript" src="./script/swiper.min.js"></script>
        <script type="text/javascript" src="./script/customBoard.js"></script>
        <script type="text/javascript" src="./script/common_jp.js"></script>
        <!-- 패럴렉스 -->
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollSmoother.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.1/ScrollToPlugin.min.js"></script>
    </head>
    <body>
        <main class="main">
            <section class="section section1">
                <div class="inner">
                    <h2>ABOUT US</h2>
                    <div class="scroll-event">
                        <div class="typo-div">
                            <div class="typo-text typo1">
                                <p class="t1">봄, 여름, 가을, 겨울</p>
                                <p class="t2">계절이 새 옷을 갈아입을 때마다의<br/>수고스러움은</p>
                            </div>
                            <div class="typo-text typo2">
                                <p class="t1">매 한끼마다</p>
                                <p class="t2">제품에 담긴 진실한 마음으로<br/> 정성으로 피어납니다</p>
                            </div>
                        </div>
                        <div class="img-div">
                            <div class="type-div type1">
                                <img src="./img/section1/circle.png" alt="반원" class="type1-img type1-img1 section1-img1">
                                <img src="./img/section1/circle.png" alt="반원" class="type1-img type1-img2 section1-img2">
                            </div>
                            <div class="type-div type2">
                                <img src="./img/section1/flower.png" alt="꽃" class="type2-img type2-img1 section1-img2">
                            </div>
                        </div>
                    </div>
                    
                </div>
            </section>
            <section class="section section2">
                <div class="scroll-event">
                    <div class="inner">
                        <div class="text-box text1">
                            <img src="./img/section2/text1.svg" alt="잡오브브라더스의" class="text" />
                            <div class="active-text">
                                <img src="./img/section2/text1-active.svg" alt="잡오브브라더스의" class="text" />
                            </div>
                        </div>
                        <div class="text-box text2">
                            <img src="./img/section2/text2.svg" alt="제작사이트를 직접 확인하세요." class="text" />
                            <div class="active-text">
                                <img src="./img/section2/text2-active.svg" alt="제작사이트를 직접 확인하세요." class="text" />
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section class="section3 ani">
                <div class="inner">
                    <div class="text-box">
                        사랑받는 IT비즈니스를 향한 첫 스텝, <br/>
                        <div class="text-wrap">
                            <div class="active-text"><span class="cover"></span>잡오브브라더스</div>입니다.
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
